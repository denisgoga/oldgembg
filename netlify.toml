[build]
  command = "pnpm run build"
  functions = "netlify/functions"
  publish = "dist/spa"


[functions]
  node_bundler = "esbuild"

# Cache headers
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/admin-login"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/admin"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  force = true
  from = "/api/admin/login"
  status = 200
  to = "/.netlify/functions/admin-login"

[[redirects]]
  force = true
  from = "/api/admin/me"
  status = 200
  to = "/.netlify/functions/admin-me"

[[redirects]]
  force = true
  from = "/api/admin/logout"
  status = 200
  to = "/.netlify/functions/admin-logout"

# SPA Routing: Redirect all non-matching routes to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
